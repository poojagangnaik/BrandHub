<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mobiles – Products</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/homepage.css">
    <link rel="stylesheet" href="../css/products.css">
</head>
<body>

<header class="flipkart-header">
    <div class="header-container">

        <div class="logo-section">
            <a href="home.html">
                <img src="../images/logo.png" class="logo-img" alt="logo">
            </a>
        </div>

        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="Search for mobiles...">
        </div>

        <div class="nav-actions">

            <a href="home.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>

            <!-- Login (shown when logged out) -->
            <a href="login.html" class="nav-item" id="loginBtn">
                <i class="fa-regular fa-user"></i>
                <span>Login</span>
            </a>

            <!-- My Profile (shown when logged in) -->
            <a href="profile.html" class="nav-item" id="userDisplay" style="display:none;">
                <i class="fa-regular fa-user"></i>
                <span>My Profile</span>
            </a>

            <!-- Logout (shown when logged in) -->
            <a href="#" class="nav-item" id="logoutBtn" style="display:none;">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </a>

            <a href="cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>

        </div>
    </div>
</header>

<section class="products-page">
    <div class="products-container">

        <aside class="filters">
            <h3>Filters</h3>
            <div class="filter-block">
                <h4>Brand</h4>
                <label><input type="checkbox"> Apple</label>
                <label><input type="checkbox"> Samsung</label>
                <label><input type="checkbox"> OnePlus</label>
                <label><input type="checkbox"> Xiaomi</label>
            </div>
            <div class="filter-block">
                <h4>RAM</h4>
                <label><input type="checkbox"> 8 GB</label>
                <label><input type="checkbox"> 12 GB</label>
                <label><input type="checkbox"> 16 GB</label>
            </div>
            <div class="filter-block">
                <h4>Screen Size</h4>
                <label><input type="checkbox"> 6.1"</label>
                <label><input type="checkbox"> 6.5"</label>
                <label><input type="checkbox"> 6.7"+</label>
            </div>
            <div class="filter-block">
                <h4>Price</h4>
                <label><input type="checkbox"> Above ₹20,000</label>
            </div>
        </aside>

        <main class="products-grid">
            <div class="product-card">
                <a href="product.html?id=iphone16pro" class="product-link">
                    <img src="../images/products/iphone.png" alt="iPhone 16 Pro">
                    <h4>iPhone 16 Pro</h4>
                    <p class="price">₹1,19,900</p>
                    <button>Add to Cart</button>
                </a>
            </div>
            <div class="product-card">
                <a href="product.html?id=samsungs20ultra" class="product-link">
                    <img src="../images/products/samsung.png" alt="Samsung Galaxy S24">
                    <h4>Samsung Galaxy S20 Ultra</h4>
                    <p class="price">₹69,999</p>
                    <button>Add to Cart</button>
                </a>
            </div>
        </main>

    </div>
</section>

<script src="../js/mobiles.js"></script>
<script src="../js/navbar.js"></script>
</body>
</html>
