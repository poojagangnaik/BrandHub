<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TVs & Appliances</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/homepage.css">
    <link rel="stylesheet" href="../css/products.css">
</head>
<body>

<header class="flipkart-header">
    <div class="header-container">

        <div class="logo-section">
            <a href="home.html">
                <img src="../images/logo.png" class="logo-img" alt="logo">
            </a>
        </div>

        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="Search TVs & Appliances...">
        </div>

        <div class="nav-actions">

            <a href="home.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>

            <a href="login.html" class="nav-item" id="loginBtn">
                <i class="fa-regular fa-user"></i>
                <span>Login</span>
            </a>

            <a href="profile.html" class="nav-item" id="userDisplay" style="display:none;">
                <i class="fa-regular fa-user"></i>
                <span>My Profile</span>
            </a>

            <a href="#" class="nav-item" id="logoutBtn" style="display:none;">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </a>

            <a href="cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>

        </div>
    </div>
</header>

<section class="products-page">
    <div class="products-container">

        <aside class="filters">
            <h3>Filters</h3>
            <div class="filter-block">
                <h4>Category</h4>
                <label><input type="checkbox"> Smart TVs</label>
                <label><input type="checkbox"> Washing Machines</label>
                <label><input type="checkbox"> Refrigerators</label>
                <label><input type="checkbox"> Air Conditioners</label>
            </div>
            <div class="filter-block">
                <h4>Brand</h4>
                <label><input type="checkbox"> Samsung</label>
                <label><input type="checkbox"> LG</label>
                <label><input type="checkbox"> Sony</label>
                <label><input type="checkbox"> Whirlpool</label>
            </div>
            <div class="filter-block">
                <h4>Screen Size</h4>
                <label><input type="checkbox"> 32"</label>
                <label><input type="checkbox"> 43"</label>
                <label><input type="checkbox"> 55"</label>
                <label><input type="checkbox"> 65"</label>
            </div>
            <div class="filter-block">
                <h4>Price</h4>
                <label><input type="checkbox"> Under ₹30,000</label>
                <label><input type="checkbox"> ₹30,000 – ₹60,000</label>
                <label><input type="checkbox"> Above ₹60,000</label>
            </div>
        </aside>

        <main class="products-grid">
            <div class="product-card">
                <a href="product.html?id=samsungtv" class="product-link">
                    <img src="../images/products/TV.png" alt="Smart TV">
                    <h4>Samsung 43" Smart TV</h4>
                    <p class="price">₹39,999</p>
                    <button>Add to Cart</button>
                </a>
            </div>
            <div class="product-card">
                <a href="product.html?id=lgwashingmachine" class="product-link">
                    <img src="../images/products/washingMachine.png" alt="Washing Machine">
                    <h4>LG Washing Machine</h4>
                    <p class="price">₹28,999</p>
                    <button>Add to Cart</button>
                </a>
            </div>
        </main>

    </div>
</section>

<script src="../js/appliances.js"></script>
<script src="../js/navbar.js"></script>
</body>
</html>
